name: Build RasPdf Pro (C# WPF)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Single EXE (Tiny Size)
      # --self-contained false করা হয়েছে অ্যাপের সাইজ ২-৩ এমবি করার জন্য
      run: dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o ./publish_output

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RasPdfPro-Standalone
        # .exe ফাইলের নাম যাই হোক না কেন, *.exe দেওয়ার কারণে এটি অটোমেটিক আপলোড হয়ে যাবে
        path: ./publish_output/*.exe
