name: Build RasFocus Pro (C# WPF)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Single EXE
      # এই কমান্ডটি কোনো আলাদা DLL ছাড়া শুধুমাত্র একটি .exe ফাইল তৈরি করবে
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish_output

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RasFocusPro-Standalone
        path: ./publish_output/RasFocusPro.exe
