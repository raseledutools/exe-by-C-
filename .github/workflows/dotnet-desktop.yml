name: Build EnterprisePdfEditor (WPF .NET 8)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Single File Windows Executable
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore EnterprisePdfEditor.csproj

    - name: Build Project
      run: dotnet build EnterprisePdfEditor.csproj -c Release --no-restore

    - name: Publish Single File Application
      # এখানে -p:PublishSingleFile=true যুক্ত করা হয়েছে যেন একটিমাত্র .exe তৈরি হয়
      run: dotnet publish EnterprisePdfEditor.csproj -c Release -r win-x64 -p:PublishSingleFile=true --self-contained false -o ./publish

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EnterprisePdfEditor-Windows-x64-SingleExe
        path: ./publish
